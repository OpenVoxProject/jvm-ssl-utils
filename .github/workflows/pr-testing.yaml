---
name: PR Testing

on:
  pull_request: {}
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pr-testing:
    name: PR Testing
    strategy:
      fail-fast: false
      matrix:
        fips: ['fips-disabled']
        version: ['17', '21', '25']
        # Add additional coverage for FIPS. Only Java 17 is tested as
        # that is the only JVM version that bc-fips 1.x is certified for.
        include:
          - fips: 'fips-enabled'
            version: '17'
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive
      - name: setup java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.version }}
      - name: Install Clojure tools
        uses: DeLaGuardo/setup-clojure@4c7a6f613e5089821bb3bb2a33a3ee115578580d # 13.6.1
        with:
          cli: latest              # Clojure CLI based on tools.deps
          lein: latest                  # Leiningen
          boot: latest                  # Boot.clj
          bb: latest                    # Babashka
          clj-kondo: latest        # Clj-kondo
          cljstyle: latest             # cljstyle
          zprint: latest                # zprint
      - name: kondo lint
        run: clj-kondo --lint src test
      - name: eastwood lint
        run: |
          java -version
          lein eastwood
      - name: clojure tests
        env:
          LEIN_PROFILE: ${{ case(matrix.fips == 'fips-enabled', 'fips', 'dev') }}
        run: lein with-profile $LEIN_PROFILE test
        timeout-minutes: 30

  tests:
    if: always()
    needs:
      - pr-testing
    runs-on: ubuntu-24.04
    name: Test suite
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
